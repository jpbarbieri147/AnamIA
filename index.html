<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnamIA</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F7F5F0;
  color: #1A1814;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 900px; margin: 0 auto; }
.header {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
h1 { color: #0F6E56; font-size: 24px; margin-bottom: 4px; }
.subtitle { color: #6B6760; font-size: 13px; }
.card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #9E9B96;
  margin-bottom: 8px;
}
.phase-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
.phase-btn {
  flex: 1;
  padding: 10px;
  border: 2px solid #E2DDD6;
  border-radius: 8px;
  background: #F7F5F0;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: #6B6760;
  font-family: inherit;
}
.phase-btn.active {
  border-color: #0F6E56;
  background: #E1F5EE;
  color: #0F6E56;
}
.record-area {
  background: #F7F5F0;
  border: 2px dashed #E2DDD6;
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  margin: 12px 0;
}
.record-area.recording {
  border-color: #A32D2D;
  background: #FCEBEB;
}
.record-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: none;
  background: #0F6E56;
  color: #fff;
  font-size: 28px;
  cursor: pointer;
  margin-bottom: 10px;
  box-shadow: 0 4px 12px rgba(15,110,86,0.3);
}
.record-btn.recording { background: #A32D2D; }
.timer {
  font-size: 24px;
  font-weight: 300;
  margin: 8px 0;
}
.timer.active { color: #A32D2D; }
.status { font-size: 13px; color: #6B6760; }
.log {
  background: #F7F5F0;
  border: 1px solid #E2DDD6;
  border-radius: 8px;
  padding: 12px;
  min-height: 100px;
  max-height: 200px;
  overflow-y: auto;
  font-size: 12px;
  line-height: 1.7;
  font-family: 'Courier New', monospace;
}
.log-line { margin-bottom: 3px; }
.log-line.sys { color: #6B6760; font-style: italic; }
.log-line.med { color: #0F6E56; }
.log-line.pac { color: #185FA5; }
.log-line.err { color: #A32D2D; font-weight: 500; }
textarea {
  width: 100%;
  min-height: 80px;
  border: 1px solid #E2DDD6;
  border-radius: 8px;
  padding: 10px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
}
textarea:focus { outline: none; border-color: #0F6E56; }
.btn-primary {
  width: 100%;
  padding: 14px;
  background: #0F6E56;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.btn-primary:hover { background: #1D9E75; }
.btn-primary:disabled { background: #9E9B96; cursor: not-allowed; }
.result {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  white-space: pre-wrap;
  font-size: 13px;
  line-height: 1.7;
}
.result h3 {
  color: #0F6E56;
  font-size: 14px;
  margin: 12px 0 6px;
}
.warning {
  background: #FAEEDA;
  border: 1px solid #FAC775;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #854F0B;
  margin-top: 12px;
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>🩺 AnamIA</h1>
  <div class="subtitle">Prontuário Inteligente · Versão de Teste</div>
</div>

<div class="card">
  <div class="label">Fase da Consulta</div>
  <div class="phase-tabs">
    <button class="phase-btn active" id="phaseAn" onclick="setPhase('an')">🩺 Anamnese</button>
    <button class="phase-btn" id="phaseEf" onclick="setPhase('ef')">🔬 Exame Físico</button>
  </div>

  <div class="label">Gravação</div>
  <div class="record-area" id="recArea">
    <button class="record-btn" id="recBtn" onclick="toggleRec()">🎤</button>
    <div class="timer" id="timer">00:00</div>
    <div class="status" id="status">Clique para gravar</div>
  </div>

  <div class="label">Log do Sistema</div>
  <div class="log" id="log"><div class="log-line sys">Aguardando gravação...</div></div>
</div>

<div class="card">
  <div class="label">Transcrição (editável)</div>
  <textarea id="transcript" placeholder="A transcrição aparecerá aqui após a gravação, ou cole o texto manualmente..."></textarea>
</div>

<button class="btn-primary" onclick="generate()">⚡ Gerar Anamnese com IA</button>

<div id="result"></div>

<div class="warning">⚠️ Protótipo. Não use dados reais. Hipóteses requerem revisão médica obrigatória.</div>

</div>

<script>
var phase = "an";
var isRec = false;
var mediaRec = null;
var audioChunks = [];
var timerInt = null;
var secs = 0;

function setPhase(p) {
  phase = p;
  document.getElementById("phaseAn").classList.toggle("active", p === "an");
  document.getElementById("phaseEf").classList.toggle("active", p === "ef");
  log("sys", "Fase: " + (p === "an" ? "Anamnese" : "Exame Físico"));
}

function log(type, msg) {
  var el = document.getElementById("log");
  var line = document.createElement("div");
  line.className = "log-line " + type;
  line.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function toggleRec() {
  if (isRec) stopRec();
  else startRec();
}

function startRec() {
  if (!navigator.mediaDevices) {
    log("err", "Microfone não disponível. Use Chrome ou Edge.");
    return;
  }
  log("sys", "Solicitando microfone...");
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
      audioChunks = [];
      var options = {};
      if (MediaRecorder.isTypeSupported("audio/webm;codecs=opus")) {
        options.mimeType = "audio/webm;codecs=opus";
      } else if (MediaRecorder.isTypeSupported("audio/webm")) {
        options.mimeType = "audio/webm";
      }
      mediaRec = new MediaRecorder(stream, options);
      log("sys", "MediaRecorder criado com: " + (options.mimeType || "default"));

      mediaRec.addEventListener("dataavailable", function(e) {
        if (e.data && e.data.size > 0) {
          audioChunks.push(e.data);
          log("sys", "Chunk recebido: " + e.data.size + " bytes (total: " + audioChunks.length + ")");
        }
      });

      mediaRec.addEventListener("stop", function() {
        log("sys", "Gravação parada. Total de chunks: " + audioChunks.length);
        stream.getTracks().forEach(function(t) { t.stop(); });
        if (audioChunks.length === 0) {
          log("err", "Nenhum chunk capturado!");
          return;
        }
        sendAudio();
      });

      mediaRec.start(1000);
      isRec = true;
      secs = 0;
      document.getElementById("recBtn").classList.add("recording");
      document.getElementById("recBtn").textContent = "⏹";
      document.getElementById("recArea").classList.add("recording");
      document.getElementById("status").textContent = "Gravando...";
      document.getElementById("timer").classList.add("active");

      timerInt = setInterval(function() {
        secs++;
        var m = String(Math.floor(secs / 60)).padStart(2, "0");
        var s = String(secs % 60).padStart(2, "0");
        document.getElementById("timer").textContent = m + ":" + s;
      }, 1000);

      log("sys", "Gravando! Fale por pelo menos 5 segundos.");
    })
    .catch(function(err) {
      log("err", "Erro microfone: " + err.message);
    });
}

function stopRec() {
  if (!mediaRec) return;
  log("sys", "Parando gravação...");
  isRec = false;
  clearInterval(timerInt);
  document.getElementById("recBtn").classList.remove("recording");
  document.getElementById("recBtn").textContent = "🎤";
  document.getElementById("recArea").classList.remove("recording");
  document.getElementById("status").textContent = "Processando...";
  document.getElementById("timer").classList.remove("active");

  if (mediaRec.state === "recording") {
    mediaRec.stop();
  }
}

function sendAudio() {
  log("sys", "Preparando áudio para envio...");
  var mimeType = "audio/webm";
  if (audioChunks[0] && audioChunks[0].type) mimeType = audioChunks[0].type;

  var blob = new Blob(audioChunks, { type: mimeType });
  log("sys", "Blob criado: " + Math.round(blob.size / 1024) + " KB, tipo: " + mimeType);

  var reader = new FileReader();
  reader.onload = function() {
    var dataUrl = reader.result;
    var base64 = dataUrl.split(",")[1];
    log("sys", "Base64 gerado: " + Math.round(base64.length / 1024) + " KB");
    log("sys", "Enviando para /api/transcribe...");

    fetch("/api/transcribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        audio: base64,
        phase: phase,
        mimeType: mimeType
      })
    })
    .then(function(r) {
      log("sys", "Resposta HTTP: " + r.status);
      return r.json().then(function(data) {
        if (!r.ok) throw new Error(data.error || ("HTTP " + r.status));
        return data;
      });
    })
    .then(function(data) {
      log("sys", "✓ Transcrição recebida!");
      if (data.transcript) {
        var ta = document.getElementById("transcript");
        ta.value = (ta.value ? ta.value + "\n" : "") + data.transcript;
        log("sys", "Texto adicionado à transcrição.");

        var lines = data.transcript.split("\n");
        lines.forEach(function(line) {
          if (line.indexOf("[MEDICO]:") === 0) {
            log("med", line.replace("[MEDICO]: ", ""));
          } else if (line.indexOf("[PACIENTE]:") === 0) {
            log("pac", line.replace("[PACIENTE]: ", ""));
          }
        });
      }
      document.getElementById("status").textContent = "Gravação encerrada";
    })
    .catch(function(err) {
      log("err", "Erro: " + err.message);
      document.getElementById("status").textContent = "Erro";
    });
  };
  reader.onerror = function() {
    log("err", "Erro ao ler blob de áudio");
  };
  reader.readAsDataURL(blob);
}

function generate() {
  var transcript = document.getElementById("transcript").value.trim();
  if (!transcript) {
    log("err", "Cole ou grave uma transcrição antes de gerar.");
    return;
  }
  log("sys", "Enviando para /api/generate...");
  document.getElementById("result").innerHTML = '<div class="card"><div class="status">⏳ Gerando anamnese...</div></div>';

  fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      transcript: transcript,
      activeKeys: ["id_nome","id_idade","id_sexo","qp","hda","is","antecedentes","habitos","hipoteses","conduta"],
      fieldMap: {
        id_nome: "Nome",
        id_idade: "Idade",
        id_sexo: "Sexo",
        qp: "Queixa principal",
        hda: "História da doença atual",
        is: "Interrogatório sintomatológico",
        antecedentes: "Antecedentes pessoais e familiares",
        habitos: "Hábitos e estilo de vida",
        hipoteses: "Hipóteses diagnósticas",
        conduta: "Conduta sugerida"
      }
    })
  })
  .then(function(r) {
    log("sys", "Resposta HTTP: " + r.status);
    return r.json().then(function(data) {
      if (!r.ok) throw new Error(data.error || ("HTTP " + r.status));
      return data;
    });
  })
  .then(function(data) {
    log("sys", "✓ Anamnese gerada!");
    var result = data.result || {};
    var html = '<div class="result"><h2 style="color:#0F6E56;font-family:Georgia,serif;font-size:20px;margin-bottom:8px;">Anamnese</h2>';
    Object.keys(result).forEach(function(k) {
      var label = k === "id_nome" ? "Nome" :
                  k === "id_idade" ? "Idade" :
                  k === "id_sexo" ? "Sexo" :
                  k === "qp" ? "Queixa Principal" :
                  k === "hda" ? "HDA" :
                  k === "is" ? "IS" :
                  k === "antecedentes" ? "Antecedentes" :
                  k === "habitos" ? "Hábitos" :
                  k === "hipoteses" ? "Hipóteses Diagnósticas" :
                  k === "conduta" ? "Conduta" : k;
      html += '<h3>' + label + '</h3><div>' + (result[k] || "Não investigado") + '</div>';
    });
    html += '</div>';
    document.getElementById("result").innerHTML = html;
  })
  .catch(function(err) {
    log("err", "Erro: " + err.message);
    document.getElementById("result").innerHTML = '<div class="card"><div class="log-line err">Erro: ' + err.message + '</div></div>';
  });
}
</script>
</body>
</html>
